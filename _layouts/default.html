<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 50 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #242424;
      background: #fff;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }

    /* Nav */
    nav {
      border-bottom: 1px solid rgba(0,0,0,.08);
      padding: 12px 0;
      position: sticky;
      top: 0;
      background: rgba(255,255,255,.97);
      backdrop-filter: blur(10px);
      z-index: 100;
    }
    .nav-inner {
      max-width: 1192px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Noto Serif TC', serif;
      font-size: 22px;
      font-weight: 700;
      color: #242424;
      text-decoration: none;
    }
    .nav-links a {
      color: #6b6b6b;
      text-decoration: none;
      font-size: 14px;
      margin-left: 24px;
    }
    .nav-links a:hover { color: #242424; }

    /* Container */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .container-wide {
      max-width: 1192px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Home hero */
    .hero {
      padding: 48px 0 32px;
      border-bottom: 1px solid rgba(0,0,0,.08);
    }
    .hero h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 42px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 12px;
    }
    .hero p {
      font-size: 18px;
      color: #6b6b6b;
      line-height: 1.6;
    }

    /* Category tabs */
    .tabs {
      padding: 16px 0;
      border-bottom: 1px solid rgba(0,0,0,.08);
      display: flex;
      gap: 32px;
      overflow-x: auto;
    }
    .tabs a {
      color: #6b6b6b;
      text-decoration: none;
      font-size: 14px;
      white-space: nowrap;
      padding-bottom: 12px;
      border-bottom: 1px solid transparent;
    }
    .tabs a:hover, .tabs a.active {
      color: #242424;
      border-bottom-color: #242424;
    }

    /* Post list */
    .post-list {
      padding: 32px 0;
    }
    .post-item {
      padding: 24px 0;
      border-bottom: 1px solid rgba(0,0,0,.05);
      display: block;
      text-decoration: none;
      color: inherit;
    }
    .post-item:hover .post-title { text-decoration: underline; }
    .post-meta {
      font-size: 13px;
      color: #6b6b6b;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .post-category {
      background: #f2f2f2;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 12px;
    }
    .post-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 6px;
      color: #242424;
    }
    .post-excerpt {
      font-size: 15px;
      color: #6b6b6b;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post-read-time {
      font-size: 12px;
      color: #9b9b9b;
      margin-top: 8px;
    }

    /* Article page */
    .article-header {
      padding: 48px 0 24px;
    }
    .article-header h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 32px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 16px;
    }
    .article-meta {
      font-size: 14px;
      color: #6b6b6b;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .article-body {
      padding: 24px 0 64px;
      font-family: 'Noto Serif TC', serif;
      font-size: 18px;
      line-height: 2;
      color: #242424;
    }
    .article-body h2 {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 24px;
      font-weight: 700;
      margin: 48px 0 16px;
      line-height: 1.3;
    }
    .article-body h3 {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin: 36px 0 12px;
    }
    .article-body p {
      margin-bottom: 24px;
    }
    .article-body ul, .article-body ol {
      margin: 0 0 24px 24px;
    }
    .article-body li {
      margin-bottom: 8px;
    }
    .article-body blockquote {
      border-left: 3px solid #242424;
      padding-left: 20px;
      margin: 32px 0;
      font-style: italic;
      color: #555;
    }
    .article-body code {
      font-family: 'Source Code Pro', monospace;
      background: #f6f6f6;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 15px;
    }
    .article-body pre {
      background: #f6f6f6;
      padding: 20px;
      border-radius: 4px;
      overflow-x: auto;
      margin: 24px 0;
    }
    .article-body pre code {
      background: none;
      padding: 0;
      font-size: 14px;
      line-height: 1.6;
    }
    .article-body hr {
      border: none;
      border-top: 1px solid rgba(0,0,0,.1);
      margin: 48px 0;
    }
    .article-body strong {
      font-weight: 700;
    }
    .article-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 24px 0;
      font-size: 15px;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .article-body th, .article-body td {
      border: 1px solid #e0e0e0;
      padding: 10px 14px;
      text-align: left;
    }
    .article-body th {
      background: #f6f6f6;
      font-weight: 600;
    }

    /* Footer */
    .site-footer {
      border-top: 1px solid rgba(0,0,0,.08);
      padding: 24px 0;
      text-align: center;
      font-size: 13px;
      color: #9b9b9b;
    }
    .site-footer a { color: #6b6b6b; text-decoration: none; }

    /* About page */
    .page-body {
      padding: 48px 0 64px;
    }
    .page-body h2 {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 24px;
      margin: 36px 0 12px;
    }
    .page-body h3 {
      font-size: 18px;
      margin: 24px 0 8px;
    }
    .page-body p, .page-body li {
      font-size: 16px;
      line-height: 1.8;
      color: #444;
    }

    @media (max-width: 680px) {
      .hero h1 { font-size: 28px; }
      .post-title { font-size: 18px; }
      .article-header h1 { font-size: 26px; }
      .article-body { font-size: 16px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="{{ site.baseurl }}/" class="nav-logo">Dennies Hong</a>
      <div class="nav-links">
        <a href="{{ site.baseurl }}/about/">About</a>
        <a href="https://medium.com/@dennies1216" target="_blank">Medium</a>
        <a href="https://linkedin.com/in/dennies-hong-b9b626248" target="_blank">LinkedIn</a>
      </div>
    </div>
  </nav>

  {{ content }}

  <footer class="site-footer">
    <div class="container">
      Dennies Hong — AI/ML Product Manager / 寫技術、寫產品、寫真實經歷。
    </div>
  </footer>
</body>
</html>
