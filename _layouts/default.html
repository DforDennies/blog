<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 50 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #242424;
      background: #fff;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }

    /* Nav - Medium style */
    nav {
      border-bottom: 1px solid rgba(0,0,0,.08);
      padding: 14px 0;
      position: sticky;
      top: 0;
      background: rgba(255,255,255,.97);
      backdrop-filter: blur(10px);
      z-index: 100;
    }
    .nav-inner {
      max-width: 1192px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Noto Serif TC', serif;
      font-size: 24px;
      font-weight: 700;
      color: #242424;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-links a {
      color: #6b6b6b;
      text-decoration: none;
      font-size: 14px;
      padding: 6px 14px;
      border-radius: 20px;
      transition: all .15s;
    }
    .nav-links a:hover { color: #242424; background: #f6f6f6; }
    .nav-links .nav-cta {
      background: #1a8917;
      color: #fff;
      font-weight: 500;
    }
    .nav-links .nav-cta:hover { background: #156d12; color: #fff; }

    /* Container */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .container-wide {
      max-width: 1192px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Home hero - clean minimal */
    .hero {
      padding: 48px 0 40px;
      border-bottom: 1px solid rgba(0,0,0,.08);
    }
    .hero-inner {
      max-width: 680px;
    }
    .hero h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 42px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
      color: #242424;
    }
    .hero p {
      font-size: 18px;
      color: #6b6b6b;
      line-height: 1.6;
    }
    .hero .hero-cta {
      display: inline-block;
      margin-top: 20px;
      padding: 8px 20px;
      background: #1a8917;
      color: #fff;
      border-radius: 20px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }
    .hero .hero-cta:hover { background: #156d12; }

    /* Category tabs */
    .tabs {
      padding: 16px 0;
      border-bottom: 1px solid rgba(0,0,0,.08);
      display: flex;
      gap: 32px;
      overflow-x: auto;
    }
    .tabs a {
      color: #6b6b6b;
      text-decoration: none;
      font-size: 14px;
      white-space: nowrap;
      padding-bottom: 12px;
      border-bottom: 1px solid transparent;
    }
    .tabs a:hover, .tabs a.active {
      color: #242424;
      border-bottom-color: #242424;
    }

    /* Post list */
    .post-list {
      padding: 16px 0;
    }
    .post-item {
      padding: 16px 0;
      border-bottom: 1px solid rgba(0,0,0,.05);
      display: flex;
      text-decoration: none;
      color: inherit;
      gap: 16px;
      align-items: flex-start;
    }
    .post-item:hover .post-title { color: #1a8917; text-decoration: underline; }
    .post-content {
      flex: 1;
      min-width: 0;
    }
    .post-meta {
      font-size: 13px;
      color: #6b6b6b;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .post-category {
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .cat-ai-product { background: #e8f5e9; color: #2e7d32; }
    .cat-ai-ml { background: #e3f2fd; color: #1565c0; }
    .cat-data { background: #fff3e0; color: #e65100; }
    .cat-platform { background: #f3e5f5; color: #7b1fa2; }
    .cat-kolr { background: #fce4ec; color: #c62828; }
    .post-title {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 4px;
      color: #242424;
      transition: color .15s;
    }
    .post-excerpt {
      font-size: 14px;
      color: #6b6b6b;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post-bottom {
      font-size: 12px;
      color: #9b9b9b;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .post-number {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f6f6f6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: #9b9b9b;
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* Article page */
    .article-header {
      padding: 48px 0 24px;
    }
    .article-header h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 32px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 16px;
    }
    .article-meta {
      font-size: 14px;
      color: #6b6b6b;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .article-body {
      padding: 24px 0 64px;
      font-family: 'Noto Serif TC', serif;
      font-size: 18px;
      line-height: 2;
      color: #242424;
    }
    .article-body h2 {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 24px;
      font-weight: 700;
      margin: 48px 0 16px;
      line-height: 1.3;
    }
    .article-body h3 {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin: 36px 0 12px;
    }
    .article-body p {
      margin-bottom: 24px;
    }
    .article-body ul, .article-body ol {
      margin: 0 0 24px 24px;
    }
    .article-body li {
      margin-bottom: 8px;
    }
    .article-body blockquote {
      border-left: 3px solid #242424;
      padding-left: 20px;
      margin: 32px 0;
      font-style: italic;
      color: #555;
    }
    .article-body code {
      font-family: 'Source Code Pro', monospace;
      background: #f6f6f6;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 15px;
    }
    .article-body pre {
      background: #f6f6f6;
      padding: 20px;
      border-radius: 4px;
      overflow-x: auto;
      margin: 24px 0;
    }
    .article-body pre code {
      background: none;
      padding: 0;
      font-size: 14px;
      line-height: 1.6;
    }
    .article-body hr {
      border: none;
      border-top: 1px solid rgba(0,0,0,.1);
      margin: 48px 0;
    }
    .article-body strong {
      font-weight: 700;
    }
    .article-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 24px 0;
      font-size: 15px;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .article-body th, .article-body td {
      border: 1px solid #e0e0e0;
      padding: 10px 14px;
      text-align: left;
    }
    .article-body th {
      background: #f6f6f6;
      font-weight: 600;
    }

    /* Projects page */
    .projects-page { padding: 0 0 64px; }
    .section-title {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .section-desc {
      font-size: 15px;
      color: #6b6b6b;
      margin-bottom: 24px;
    }
    .project-card {
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 12px;
      transition: border-color .15s;
    }
    .project-card:hover { border-color: rgba(0,0,0,.2); }
    .project-card h3 {
      font-size: 17px;
      font-weight: 700;
      margin: 8px 0 6px;
    }
    .project-card p {
      font-size: 14px;
      color: #555;
      line-height: 1.6;
      margin: 0;
    }
    .project-tech {
      font-size: 13px;
      color: #9b9b9b;
      margin-top: 8px;
    }
    .project-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-green { background: #e8f5e9; color: #2e7d32; }
    .badge-blue { background: #e3f2fd; color: #1565c0; }
    .badge-orange { background: #fff3e0; color: #e65100; }
    .badge-purple { background: #f3e5f5; color: #7b1fa2; }

    .spec-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .spec-card {
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 8px;
      padding: 20px;
      text-decoration: none;
      color: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    .spec-card:hover {
      border-color: rgba(0,0,0,.2);
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .spec-card h3 {
      font-size: 15px;
      font-weight: 700;
      margin: 8px 0 4px;
    }
    .spec-card p {
      font-size: 13px;
      color: #6b6b6b;
      line-height: 1.5;
      margin: 0;
    }
    .spec-type {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      background: #242424;
      color: #fff;
    }
    .btn-articles {
      display: inline-block;
      padding: 10px 24px;
      border: 1px solid #242424;
      border-radius: 20px;
      color: #242424;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: background .15s;
    }
    .btn-articles:hover { background: #1a8917; color: #fff; border-color: #1a8917; }

    @media (max-width: 680px) {
      .spec-grid { grid-template-columns: 1fr; }
    }

    /* Footer */
    .site-footer {
      border-top: 1px solid rgba(0,0,0,.08);
      padding: 24px 0;
      text-align: center;
      font-size: 13px;
      color: #9b9b9b;
    }
    .site-footer a { color: #6b6b6b; text-decoration: none; }

    /* About page */
    .page-body {
      padding: 48px 0 64px;
    }
    .page-body h2 {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 24px;
      margin: 36px 0 12px;
    }
    .page-body h3 {
      font-size: 18px;
      margin: 24px 0 8px;
    }
    .page-body p, .page-body li {
      font-size: 16px;
      line-height: 1.8;
      color: #444;
    }

    @media (max-width: 680px) {
      .hero h1 { font-size: 28px; }
      .post-title { font-size: 18px; }
      .article-header h1 { font-size: 26px; }
      .article-body { font-size: 16px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="{{ site.baseurl }}/" class="nav-logo">Dennies Hong</a>
      <div class="nav-links">
        <a href="{{ site.baseurl }}/">Articles</a>
        <a href="{{ site.baseurl }}/projects/">Projects</a>
        <a href="{{ site.baseurl }}/about/">About</a>
        <a href="https://medium.com/@dennies1216" target="_blank">Medium</a>
        <a href="https://linkedin.com/in/dennies-hong-b9b626248" target="_blank" class="nav-cta">LinkedIn</a>
      </div>
    </div>
  </nav>

  {{ content }}

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true, theme: 'neutral', themeVariables: { fontSize: '14px' } });
  </script>

  <footer class="site-footer">
    <div class="container">
      Dennies Hong — AI/ML Product Manager / 寫技術、寫產品、寫真實經歷。
    </div>
  </footer>
</body>
</html>
